version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: signalstream-qdrant
    ports:
      - "6333:6333" # API port
      - "6334:6334" # gRPC port
    volumes:
      - ./qdrant_storage:/qdrant/storage

  postgres:
    image: postgres:16
    container_name: signalstream-postgres
    environment:
      POSTGRES_DB: signalstream
      POSTGRES_USER: signalstream
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  qdrant_storage:
  postgres_data: